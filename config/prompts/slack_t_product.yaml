  IMPORTANT FORMATTING NOTES:
  - Slack messages may contain emoji, mentions (@user), and channel references (#channel)
  - URLs may be in Slack's format: <https://example.com|display text>
  - Parse these appropriately for links and context
  - Focus on substantive content, not formatting artifacts
